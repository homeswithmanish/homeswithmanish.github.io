const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const enc = new TextEncoder();

async function deriveKek(password, salt) {
  const mat = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: DATA.iter, hash: 'SHA-256' },
    mat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
}

async function tryUnlock(password) {
  for (const entry of DATA.keys) {
    try {
      const kek = await deriveKek(password, b64(entry.salt));
      const rawK = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(entry.iv) }, kek, b64(entry.wrapped));
      const K = await crypto.subtle.importKey('raw', rawK, 'AES-GCM', false, ['decrypt']);
      const gz = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(DATA.payload.iv) }, K, b64(DATA.payload.ct));
      let html;
      if (DATA.gz) {
        if (typeof DecompressionStream === 'undefined') {
          throw new Error('This browser is too old for this page — please use a current Chrome, Safari, Firefox, or Edge.');
        }
        const stream = new Blob([gz]).stream().pipeThrough(new DecompressionStream('gzip'));
        html = await new Response(stream).text();
      } else {
        html = new TextDecoder().decode(gz);
      }
      document.open();
      document.write(html);
      document.close();
      return true;
    } catch (e) {
      if (e && e.message && e.message.indexOf('browser') !== -1) { showErr(e.message); return false; }
      /* wrong key for this entry — try the next one */
    }
  }
  return false;
}

const card = document.getElementById('card');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
const pw = document.getElementById('pw');

function showErr(msg) {
  err.textContent = msg;
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
}

async function attempt(password) {
  if (!password) return;
  btn.disabled = true;
  btn.textContent = 'Unlocking…';
  const ok = await tryUnlock(password.trim());
  if (!ok) {
    btn.disabled = false;
    btn.textContent = 'Unlock';
    showErr('That code didn’t work. Check for typos — codes are case-sensitive.');
  }
}

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  attempt(pw.value);
});

// One-click links: /labs/<slug>/#k=<code> — the fragment never reaches the server.
const m = location.hash.match(/[#&]k=([^&]+)/);
if (m) attempt(decodeURIComponent(m[1]));
